<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Local SDXL Inference</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family: sans-serif;
        margin: 0;
        padding: 1.5rem;
        background: #111;
        color: #f5f5f5;
      }
      h1 {
        margin-top: 0;
      }
      label {
        display: block;
        margin-bottom: 0.25rem;
        font-weight: 600;
      }
      input,
      select,
      button {
        width: 100%;
        padding: 0.75rem;
        margin-bottom: 1rem;
        border-radius: 0.5rem;
        border: 1px solid #444;
        background: #222;
        color: #f5f5f5;
      }
      button {
        cursor: pointer;
        background: #0a84ff;
        border: none;
        font-weight: 700;
      }
      .controls {
        max-width: 480px;
      }
      canvas {
        margin-top: 2rem;
        width: 512px;
        height: 512px;
        border: 1px solid #333;
        background: #000;
      }
      #statusLog {
        font-family: monospace;
        white-space: pre-wrap;
        background: #1b1b1b;
        padding: 1rem;
        border-radius: 0.5rem;
        max-width: 640px;
        margin-top: 1.5rem;
      }
    </style>
  </head>
  <body>
    <h1>Local Browser SDXL Inference</h1>
    <p>
      This prototype keeps the entire SDXL pipeline within your browser. Provide a
      <code>.safetensors</code> checkpoint, tune inference parameters, and launch the
      computation without relying on a server.
    </p>
    <div class="controls">
      <label for="checkpoint">Checkpoint (.safetensors)</label>
      <input id="checkpoint" type="file" accept=".safetensors" />

      <label for="steps">Step Count</label>
      <input id="steps" type="number" min="1" max="150" value="25" />

      <label for="scheduler">Scheduler</label>
      <select id="scheduler">
        <option value="ddim">DDIM</option>
        <option value="euler">Euler</option>
        <option value="heun">Heun</option>
      </select>

      <label for="sampler">Sampler</label>
      <select id="sampler">
        <option value="standard">Standard Ancestral</option>
        <option value="deterministic">Deterministic</option>
      </select>

      <label for="cfg">Classifier Free Guidance (CFG)</label>
      <input id="cfg" type="number" step="0.5" min="1" max="30" value="7.5" />

      <button id="generate">Generate</button>
    </div>

    <canvas id="preview" width="1024" height="1024"></canvas>

    <section id="statusLog"></section>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
