<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Local SDXL Inference</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      color-scheme: dark light;
      font-family: system-ui, sans-serif;
    }
    body {
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: radial-gradient(circle at top, #10131a 0%, #050608 100%);
      color: #e8f1ff;
    }
    header {
      padding: 1.5rem 2rem 0.5rem;
    }
    main {
      flex: 1;
      display: grid;
      grid-template-columns: minmax(280px, 400px) 1fr;
      gap: 2rem;
      padding: 0 2rem 2rem;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      background: rgba(16, 22, 32, 0.7);
      border-radius: 1rem;
      padding: 1.5rem;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(110, 160, 255, 0.2);
      backdrop-filter: blur(18px);
    }
    label {
      font-weight: 600;
      font-size: 0.95rem;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    input[type="file"] {
      color: inherit;
    }
    input, select, textarea {
      font: inherit;
      border-radius: 0.6rem;
      border: 1px solid rgba(110, 160, 255, 0.35);
      background: rgba(4, 8, 14, 0.8);
      color: inherit;
      padding: 0.6rem 0.75rem;
    }
    textarea {
      resize: vertical;
      min-height: 5.5rem;
    }
    button {
      padding: 0.8rem 1.2rem;
      border-radius: 0.8rem;
      border: none;
      background: linear-gradient(135deg, #4c7dff 0%, #3ec8ff 100%);
      color: #050608;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    button:disabled {
      cursor: progress;
      opacity: 0.65;
    }
    button:not(:disabled):hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 25px rgba(66, 150, 255, 0.3);
    }
    canvas {
      width: min(80vmin, 512px);
      height: min(80vmin, 512px);
      border-radius: 1rem;
      border: 1px solid rgba(110, 160, 255, 0.35);
      background: rgba(4, 8, 14, 0.6);
      image-rendering: pixelated;
    }
    #status {
      font-size: 0.9rem;
      margin-top: 0.5rem;
      color: #9ecaff;
    }
    @media (max-width: 860px) {
      main {
        grid-template-columns: 1fr;
      }
      canvas {
        width: min(90vw, 420px);
        height: min(90vw, 420px);
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Local Browser SDXL Engine</h1>
    <p>Run SDXL style latent diffusion entirely within your browser using your own <code>.safetensors</code> checkpoints.</p>
  </header>
  <main>
    <form id="inference-form">
      <label>Checkpoint (.safetensors)
        <input id="checkpoint-input" type="file" accept=".safetensors" />
      </label>
      <label>Prompt
        <textarea id="prompt-input" placeholder="Describe the scene you want to create"></textarea>
      </label>
      <label>Negative Prompt
        <textarea id="negative-prompt-input" placeholder="Elements you wish to avoid"></textarea>
      </label>
      <label>Sampling Steps
        <input id="steps-input" type="number" min="1" max="150" value="30" />
      </label>
      <label>CFG Scale
        <input id="cfg-input" type="number" min="1" max="30" value="7" step="0.5" />
      </label>
      <label>Scheduler
        <select id="scheduler-select">
          <option value="ddim">Deterministic DDIM</option>
          <option value="euler">Euler</option>
        </select>
      </label>
      <label>Sampler
        <select id="sampler-select">
          <option value="ddim">DDIM Sampler</option>
          <option value="euler">Euler Sampler</option>
        </select>
      </label>
      <label>Seed
        <input id="seed-input" type="number" value="2024" />
      </label>
      <button id="generate-button" type="submit">Generate Image</button>
      <div id="status">Checkpoint not loaded.</div>
    </form>
    <div>
      <canvas id="preview-canvas" width="256" height="256"></canvas>
    </div>
  </main>
  <script type="module" src="./src/script.js"></script>
</body>
</html>
